name: Miner compatibility report
description: Report whether a miner works with SoloPool
labels: ["compatibility"]
body:
  - type: input
    id: miner
    attributes:
      label: Miner model
      placeholder: "Bitaxe Gamma / NerdMiner v2 / AvalonQ"
    validations:
      required: true
  - type: input
    id: firmware
    attributes:
      label: Firmware version
    validations:
      required: true
  - type: dropdown
    id: status
    attributes:
      label: Status
      options:
        - Works
        - Works with caveats
        - Does not work
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes / caveats
