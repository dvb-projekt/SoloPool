name: Bug report
description: SoloPool isn't working as expected
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: SoloPool version / commit
    validations:
      required: true
  - type: input
    id: host
    attributes:
      label: Host (OS, hardware)
      placeholder: "Umbrel Home / Ryzen 7 / 11 GiB"
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: Steps to reproduce + expected vs. actual
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Pool logs
      render: shell
